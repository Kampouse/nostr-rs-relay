# Railway configuration for nostr-rs-relay
# Railway auto-detects Rust projects from Cargo.toml

[deploy]
# Create database directory before starting
preDeployCommand = "mkdir -p /app/db"
startCommand = "./target/release/nostr-rs-relay"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"

[variables]
# Ensure port matches config.toml
PORT = "8080"
