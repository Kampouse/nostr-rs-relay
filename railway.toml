# Railway configuration for nostr-rs-relay

[deploy]
# Use Railpack's automatic detection
# Start command uses just the binary name - Railpack will place it in PATH
startCommand = "RUST_LOG=info,nostr_rs_relay=debug nostr-rs-relay --config config.railway.toml --db ./db"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"

[variables]
# Database configuration
DATABASE_ENGINE = "sqlite"

# Server configuration
PORT = "8080"

# Ensure Railpack uses the correct Rust version (matches rust-toolchain.toml)
RAILPACK_RUST_VERSION = "1.88"
