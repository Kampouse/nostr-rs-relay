# Minimal Railway configuration
[info]
relay_url = "wss://your-relay-up.railway.app/"
name = "nostr-rs-relay"
description = "Nostr relay on Railway"

[database]
engine = "libsql"
data_directory = "/app/db"
in_memory = false
min_conn = 0
max_conn = 8
connection = ""
connection_write = ""

[network]
address = "0.0.0.0"
port = 8080

[options]
reject_future_seconds = 1800

[authorization]
nip42_auth = false
